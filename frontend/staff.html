<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="navbar">

  <div class="logo">
    🎓 Staff Dashboard
  </div>

  <div>

    <button onclick="goBack()">⬅ Back</button>

    <button onclick="goHome()">🏠 Home</button>

    <button onclick="logout()">🚪 Logout</button>

  </div>

</div>

<div class="container">

  <div class="top-controls">

    <input type="date" id="date">

    <button class="green-btn" onclick="openAdd()">
      ➕ Add Student
    </button>

    <button class="blue-btn" onclick="saveAttendance()">
      💾 Save Attendance
    </button>

    <button class="orange-btn" onclick="exportExcel()">
      📥 Export Excel
    </button>

  </div>

  <div class="bulk-actions">

    <label>
      <input type="checkbox" id="selectAll">
      Select All
    </label>

    <button onclick="bulkUpdate('Present')">
      Present
    </button>

    <button onclick="bulkUpdate('Absent')">
      Absent
    </button>

    <button onclick="bulkUpdate('OD')">
      OD
    </button>

  </div>

  <div class="table-container">

    <table>

      <thead>

        <tr>
          <th>Select</th>
          <th>Name</th>
          <th>Roll No</th>
          <th>Status</th>
          <th>Attendance %</th>
          <th>Actions</th>
        </tr>

      </thead>

      <tbody id="table"></tbody>

    </table>

  </div>

</div>

<!-- ADD STUDENT MODAL -->

<div class="modal" id="addModal">

  <div class="modal-content">

    <h2>Add Student</h2>

    <input id="name" placeholder="Student Name">

    <input id="roll" placeholder="Roll Number">

    <div class="modal-buttons">

      <button onclick="addStudent()">
        Save
      </button>

      <button class="danger-btn" onclick="closeAdd()">
        Cancel
      </button>

    </div>

  </div>

</div>

<!-- EDIT MODAL -->

<div class="modal" id="editModal">

  <div class="modal-content">

    <h2>Edit Student</h2>

    <input id="ename">

    <input id="eroll">

    <div class="modal-buttons">

      <button onclick="updateStudent()">
        Update
      </button>

      <button class="danger-btn" onclick="closeEdit()">
        Cancel
      </button>

    </div>

  </div>

</div>

<script src="staff.js"></script>

<script>

function goBack() {
  location.href = "select.html";
}

function goHome() {
  location.href = "index.html";
}

function logout() {
  location.href = "index.html";
}

</script>

</body>
</html>
