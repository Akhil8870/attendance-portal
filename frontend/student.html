<!DOCTYPE html>
<html>
<head>

  <title>Student Dashboard</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

  <div class="logo">
    🎓 Student Dashboard
  </div>

  <div>

    <button onclick="goHome()">
      🏠 Home
    </button>

    <button onclick="logout()">
      🚪 Logout
    </button>

  </div>

</div>

<div class="container">

  <div class="card">

    <h2 style="margin-bottom:20px;">
      Check Attendance
    </h2>

    <div class="top-controls">

      <input
      type="text"
      id="roll"
      placeholder="Enter Roll Number">

      <button onclick="loadStudent()">
        View Attendance
      </button>

    </div>

    <div id="studentInfo"></div>

  </div>

  <!-- STATS -->

  <div id="cards" class="stats-grid"></div>

  <!-- TABLE -->

  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>Date</th>

          <th>Status</th>

          <th>Attendance %</th>

        </tr>

      </thead>

      <tbody id="history"></tbody>

    </table>

  </div>

</div>

<script src="student.js"></script>

<script>

function goHome() {
  location.href = "index.html";
}

function logout() {
  location.href = "index.html";
}

</script>

</body>
</html>
