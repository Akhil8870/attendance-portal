<!DOCTYPE html>
<html>
<head>
  <title>Register - Attendance Portal</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
    }

    /* TOP HEADER */
    .top-bar {
      background: white;
      padding: 15px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .top-bar img {
      height: 50px;
    }

    /* BACK BUTTON */
    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;

      padding: 8px 12px;
      border: none;
      border-radius: 6px;

      background: #2c3e50;
      color: white;

      cursor: pointer;
      font-weight: bold;
    }

    .back-btn:hover {
      background: #1a252f;
    }

    /* CENTER BOX */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }

    .card {
      background: white;
      padding: 30px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0px 0px 15px #ccc;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: darkgreen;
    }

  </style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="goHome()">
  ⬅ Home
</button>

<!-- HEADER -->
<div class="top-bar">
  <img src="https://th.bing.com/th/id/OIP.1Upv_ezQn5Vm72Y4wYPHpQHaBT?w=326&h=62&c=7&r=0&o=7&pid=1.7&rm=3">
</div>

<!-- REGISTER FORM -->
<div class="container">

  <div class="card">

    <h2>Create Account</h2>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <select id="role">
      <option value="student">Student</option>
      <option value="staff">Staff</option>
    </select>

    <button onclick="register()">
      Register
    </button>

  </div>

</div>

<script src="script.js"></script>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
